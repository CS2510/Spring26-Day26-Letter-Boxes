<!doctype html>
<html>

<head>
  <title>Test Point/Polygon Collisions</title>
  <style>
    /* Engine-Specific */
    * {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <canvas id="canv"></canvas>
  <script src="./engine/Engine.js"></script>
  <script src="./engine/Scene.js"></script>
  <script src="./engine/GameObject.js"></script>
  <script src="./engine/Component.js"></script>
  <script src="./engine/Input.js"></script>
  <script src="./engine/Vector2.js"></script>
  <script src="./engine/Time.js"></script>
  <script src="./engine/Collisions.js"></script>
  <script src="./engine/SceneManager.js"></script>
  
  <script src="./engine/components/Transform.js"></script>
  <script src="./engine/components/TextLabel.js"></script>
  <script src="./engine/components/Polygon.js"></script>
  <script src="./engine/components/Collider.js"></script>
  <script src="./engine/components/RigidBody.js"></script>







  <script>

    class MainScene extends Scene {
      constructor() {
        super()

        const polygonGameObject = this.instantiate(new GameObject("Polygon Game Object"), new Vector2(300, 300))
        polygonGameObject.addComponent(new Polygon(), {
          points: [
            new Vector2(-200, -140),
            new Vector2(-250, 180),
            new Vector2(200, 200),
            new Vector2(300, 150),
            new Vector2(200, -200),

            // new Vector2(200, -200),
            // new Vector2(300, 150),
            // new Vector2(200, 200),
            // new Vector2(-250, 180),
            // new Vector2(-200, -140),
          ]
        })
        polygonGameObject.addComponent(new Collider())


        this.instantiate(new GameObject("Mouse Follower Game Object")).addComponent(new MouseFollowerComponent())
      }
    }

    class MouseFollowerComponent extends Component {
      start
      end
      update() {
        if (Input.mousePosition) {
          this.start = Input.mousePosition.clone()
          delete this.end

          const polygon = GameObject.find("Polygon Game Object")
          const result = Collisions.isCollisionPointGameObject(this.start, polygon)
          if (result) {
            this.end = this.start.add(result)
          }

        }

      }
      draw(ctx) {
        if (this.start && this.end) {
          ctx.strokeStyle = "red"
          ctx.lineWidth = 5
          ctx.beginPath()
          ctx.moveTo(this.start.x, this.start.y)
          ctx.lineTo(this.end.x, this.end.y)
          ctx.stroke()

        }

      }
    }




    SceneManager.currentScene = new MainScene()
    Engine.start()
  </script>
</body>

</html>
